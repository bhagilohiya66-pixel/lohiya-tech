<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Lohiya Tech</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6rem 1.5rem 2rem;
      position: relative;
    }

    .auth-bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 30% 50%, rgba(0, 102, 255, 0.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 70% 50%, rgba(0, 212, 255, 0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .auth-container {
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 1;
    }

    .auth-header { text-align: center; margin-bottom: 2rem; }

    .auth-logo {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 1.5rem;
    }
    .auth-logo .accent { color: var(--accent-cyan); }

    .auth-header h1 {
      font-size: 1.9rem;
      margin-bottom: 0.5rem;
    }

    .auth-header p {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2.5rem;
      position: relative;
      overflow: hidden;
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.88rem;
      color: var(--text-secondary);
    }

    .auth-footer a {
      color: var(--accent-cyan);
      font-weight: 500;
    }

    .password-wrapper {
      position: relative;
    }

    .password-toggle {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 0;
      transition: var(--transition);
    }

    .password-toggle:hover { color: var(--accent-cyan); }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="/" class="nav-brand"><span>⬡</span> Lohiya<span class="brand-accent">Tech</span></a>
    <div class="nav-toggle"><span></span><span></span><span></span></div>
    <ul class="nav-links" id="navLinks">
      <ul id="nav-auth"></ul>
    </ul>
  </nav>

  <div class="auth-bg"></div>

  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-header">
        <div class="auth-logo"><span>⬡</span> Lohiya<span class="accent">Tech</span></div>
        <h1>Welcome Back</h1>
        <p>Sign in to your account to continue</p>
      </div>

      <div class="auth-card">
        <div class="alert" id="alert"></div>

        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input class="form-input" type="email" id="email" placeholder="you@example.com" autocomplete="email" />
          <div class="form-error" id="email-error"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="password-wrapper">
            <input class="form-input" type="password" id="password" placeholder="Your password" autocomplete="current-password" />
            <button class="password-toggle" type="button" id="pwToggle" onclick="togglePw()">👁</button>
          </div>
          <div class="form-error" id="password-error"></div>
        </div>

        <button class="btn btn-primary btn-full mt-2" id="loginBtn" onclick="handleLogin()">
          Sign In
        </button>

        <div class="divider"><span>or</span></div>

        <a href="/register">
          <button class="btn btn-outline btn-full">Create New Account</button>
        </a>
      </div>

      <div class="auth-footer">
        Don't have an account? <a href="/register">Sign up free</a>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    // Redirect if already logged in
    document.addEventListener('DOMContentLoaded', () => {
      if (Auth.isLoggedIn()) window.location.href = '/dashboard';
    });

    function togglePw() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    async function handleLogin() {
      const btn = document.getElementById('loginBtn');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const alert = document.getElementById('alert');

      // Reset
      clearAllErrors(document.querySelector('.auth-card'));
      alert.className = 'alert';
      alert.textContent = '';

      // Validate
      let valid = true;
      if (!email || !/^\S+@\S+\.\S+$/.test(email)) {
        showFieldError('email', 'Please enter a valid email address');
        valid = false;
      }
      if (!password) {
        showFieldError('password', 'Password is required');
        valid = false;
      }
      if (!valid) return;

      showLoading(btn, 'Signing In...');

      try {
        const data = await api.post('/auth/login', { email, password });
        Auth.setToken(data.token);
        Auth.setUser(data.user);
        Toast.success('Login successful! Redirecting...');
        setTimeout(() => window.location.href = '/dashboard', 800);
      } catch (err) {
        alert.textContent = err.message || 'Login failed. Please try again.';
        alert.className = 'alert alert-error show';
        hideLoading(btn);
      }
    }

    // Enter key support
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
